name: Release CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fast:
    name: PR / fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint:ci
      - run: npm run format:check
      - run: npm run test:run

  coverage:
    name: Quality / coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  content-build:
    name: Release / content-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tools/conversion/package-lock.json
      - run: npm ci
      - run: npm ci --prefix tools/conversion
      - run: npm --prefix tools/conversion run type-check
      - run: npm --prefix tools/conversion test
      - run: npm run content:validate:runtime
      - run: npm run content:validate
      - run: npm run content:validate:canon:strict
      - run: npm run literary:stage -- eternal-return-literary-v1.0.2
      - run: npm run literary:validate
      - run: npm run literary:slice:stage -- archaeologist-opening-accept
      - run: npm run literary:slice:validate
      - run: npm run build
      - run: npm run bundle:check
      - name: Upload literary release intake report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: literary-release-intake-report
          path: build/literary-import-staging/
          if-no-files-found: warn
          retention-days: 7
      - name: Upload bundle report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-report
          path: output/bundle/
          if-no-files-found: error
          retention-days: 7

  browser:
    name: Release / browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install pinned Chromium environment
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload failed browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure
          path: |
            output/playwright/report/
            output/playwright/test-results/
          if-no-files-found: ignore
          retention-days: 5

  node-24:
    name: Compatibility / node-24
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tools/conversion/package-lock.json
      - run: npm ci
      - run: npm ci --prefix tools/conversion
      - run: npm run type-check
      - run: npm run test:run
      - run: npm --prefix tools/conversion test

  dependency-review:
    name: Security / dependency-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
      - name: Record push behavior
        if: github.event_name != 'pull_request'
        run: echo "Dependency review evaluates pull-request diffs."

  secret-scan:
    name: Security / secret-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
