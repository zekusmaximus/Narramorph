version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      root-security:
        applies-to: security-updates
        patterns:
          - '*'
      root-development-minor:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch
      root-runtime-patch:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - patch

  - package-ecosystem: npm
    directory: /tools/conversion
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      conversion-security:
        applies-to: security-updates
        patterns:
          - '*'
      conversion-development-minor:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch
      conversion-runtime-minor:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /tools
    schedule:
      interval: weekly
      day: monday
      time: '09:45'
      timezone: America/New_York
    open-pull-requests-limit: 3
    groups:
      legacy-tools-security:
        applies-to: security-updates
        patterns:
          - '*'
      legacy-tools-runtime-minor:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '10:00'
      timezone: America/New_York
    open-pull-requests-limit: 3
    groups:
      github-actions-minor:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
