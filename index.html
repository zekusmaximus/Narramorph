<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive narrative platform for creating node-based story experiences"
    />
    <title>Narramorph Fiction</title>

    <!-- Self-hosted Inter (SIL OFL 1.1); no external font requests. See public/fonts/OFL.txt. -->
    <link
      rel="preload"
      href="/fonts/inter-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Prevent flash of unstyled content -->
    <style>
      /* Self-hosted Inter — declared inline so the @font-face rules stay out of the
         budget-measured CSS bundle; the woff2 files are served same-origin from /fonts. */
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 300;
        font-display: swap;
        src: url('/fonts/inter-latin-300-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/inter-latin-400-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('/fonts/inter-latin-500-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('/fonts/inter-latin-600-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/inter-latin-700-normal.woff2') format('woff2');
      }

      html {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #fafafa;
      }

      /* Loading indicator while app loads */
      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 18px;
        color: #6b7280;
      }

      /* Hide loading when app is ready */
      .app-loaded #loading {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">Loading Narramorph Fiction...</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
