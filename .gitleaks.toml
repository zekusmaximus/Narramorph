title = "Narramorph Gitleaks configuration"

# Preserve every built-in rule. The generated Story Package catalogs contain
# deterministic SHA-256 integrity values that match the generic API-key
# heuristic; their source inputs and generator remain scanned.
[extend]
useDefault = true

[allowlist]
description = "Reproducible Story Package metadata false positives"
paths = [
  '''^story-packages/eternal-return/catalog\.json$''',
  '''^story-packages/fixtures/tidal-signals/catalog\.json$''',
]
# These exact runtime branch IDs trigger the generic-api-key entropy heuristic
# when assigned to passageStableKey. No other concordance values are exempted.
regexTarget = "secret"
regexes = [
  '''^algo-L2-invest$''',
  '''^algo-L2-resist$''',
  '''^hum-L2-invest$''',
]
